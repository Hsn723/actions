name: Create Release PR
on:
  workflow_call:
  push:
    branches:
      - master
permissions:
  contents: write
  pull-requests: write
jobs:
  version:
    uses: ./.github/workflows/read-version.yml
  create-release-pr:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
            git config user.name "$GITHUB_ACTOR"
            git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      - name: Check if tag exists
        id: tag
        run: |
          TAG="${{ needs.version.outputs.version-tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "create-pr=true" >> $GITHUB_OUTPUT
          else
            echo "create-pr=false" >> $GITHUB_OUTPUT
          fi
      - name: Create release PR
        if: steps.tag.outputs.create-pr == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAJOR="${{ needs.version.outputs.major }}"
          MINOR="${{ needs.version.outputs.minor }}"
          PATCH="${{ needs.version.outputs.patch }}"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          BRANCH="release-v${NEXT_VERSION}"
          if git rev-parse --verify "origin/${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists, skipping PR creation"
            exit 0
          fi
          git checkout -b "${BRANCH}"
          echo "${NEXT_VERSION}" > VERSION
          git add VERSION
          git commit -m "Bump version from ${{ steps.version.outputs.version-tag }} to v${NEXT_VERSION}"
          git push origin "${BRANCH}"
          gh pr create --title "Release v${NEXT_VERSION}" --body "This PR prepares the next release by bumping VERSION to v${NEXT_VERSION}."
