name: Read VERSION file
on:
  workflow_call:
    inputs:
      version_file:
        required: false
        type: string
        default: VERSION
    outputs:
      version:
        description: "The version read from the specified file"
        value: ${{ jobs.read-version.outputs.version }}
      version-tag:
        description: "The version prefixed with 'v' (e.g. v1.2.3)"
        value: "v${{ jobs.read-version.outputs.version }}"
      major:
        description: "The major version component"
        value: ${{ jobs.read-version.outputs.major }}
      minor:
        description: "The minor version component"
        value: ${{ jobs.read-version.outputs.minor }}
      patch:
        description: "The patch version component"
        value: ${{ jobs.read-version.outputs.patch }}
permissions:
  contents: read
jobs:
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read-version.outputs.version }}
      major: ${{ steps.read-version.outputs.major }}
      minor: ${{ steps.read-version.outputs.minor }}
      patch: ${{ steps.read-version.outputs.patch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Read version
        id: read-version
        run: |
          VERSION_FILE="${{ inputs.version_file }}"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "VERSION file not found at path: $VERSION_FILE"
            exit 1
          fi
          VERSION=$(cat "$VERSION_FILE")
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION file does not contain a valid version (e.g. 1.2.3): $VERSION"
            exit 1
          fi
          VERSION="${VERSION}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
