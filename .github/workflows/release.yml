name: release
on:
  workflow_call:
    inputs:
      additional-setup:
        description: "Additional setup commands to run before release (e.g. setting up extra tools)"
        required: false
        type: string
        default: ""
      attest-checksums:
        description: "Whether to attest checksums"
        required: false
        type: boolean
        default: true
      attest-digests:
        description: "Whether to attest image digests"
        required: false
        type: boolean
        default: true
      upload-image-sbom:
        description: "Whether to generate and upload SBOM for container images"
        required: false
        type: boolean
        default: true
permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write
jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.tag.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Read version
        id: version
        run: |
          if [ ! -f VERSION ]; then
            echo "VERSION file not found!"
            exit 1
          fi
          echo "VERSION=v$(cat VERSION)" >> $GITHUB_OUTPUT
      - name: Check if tag exists
        id: tag
        run: |
          TAG="${{ steps.version.outputs.VERSION }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "release=false" >> $GITHUB_OUTPUT
          else
            echo "release=true" >> $GITHUB_OUTPUT
          fi
      - name: Create tag
        if: steps.tag.outputs.release == 'true'
        run: |
          TAG="${{ steps.version.outputs.VERSION }}"
          git tag "$TAG"
          git push origin "$TAG"
  release:
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.release == 'true'
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: sigstore/cosign-installer@v4.1.1
      - uses: anchore/sbom-action/download-syft@v0.24.0
      - name: GHCR Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Additional setup
        if: ${{ inputs.additional-setup != '' }}
        run: |
          set -euo pipefail
          ${{ inputs.additional-setup }}
        shell: bash
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest checksums
        if: ${{ inputs.attest-checksums }}
        uses: actions/attest@v4
        with:
          subject-checksums: ./dist/checksums.txt
      - name: Attest image digests
        if: ${{ inputs.attest-digests }}
        uses: actions/attest@v4
        with:
          subject-checksums: ./dist/digests.txt
      - name: Install syft
        if: ${{ inputs.upload-image-sbom }}
        uses: anchore/sbom-action/download-syft@v0.24.0
      - name: Install oras
        if: ${{ inputs.upload-image-sbom }}
        run: go install oras.land/oras/cmd/oras@latest
      - name: Generate and attach container image SBOM
        if: ${{ inputs.upload-image-sbom }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGES=$(jq -r '.[] | select(.type == "Docker Image") | .name' dist/artifacts.json)
          for IMAGE in ${IMAGES}; do
            SBOM_FILE="dist/sbom-$(echo ${IMAGE} | tr '/:' '_').json"
            syft "${IMAGE}" -o spdx-json > "${SBOM_FILE}"
            oras attach --artifact-type application/spdx+json "${IMAGE}" "${SBOM_FILE}:application/spdx+json"
          done
