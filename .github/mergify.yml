pull_request_rules:
  - name: Automatic merge
    conditions:
      - "#approved-reviews-by>=1"
      - "#review-requested=0"
      - "#changes-requested-reviews-by=0"
    actions:
      merge:
        method: squash
  - name: Automatic merge for dependabot
    conditions:
      - author‾=^dependabot¥[bot¥]$
      - or:
        - files‾=^((¥.github/workflows/.*)|(¥.pre-commit-config))¥.ya?ml$
      - -files‾=^(?!((¥.github/workflows/.*)|(¥.pre-commit-config))¥.ya?ml$).*
    actions:
      review:
        type: APPROVE
      merge:
        method: squash
